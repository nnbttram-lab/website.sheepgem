<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheep Gem — Feng Shui Stones for a Balanced Life</title>
<meta name="description" content="Hand-selected feng shui stones and crystals for wealth, love, protection, and calm.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header" id="home">
  <div class="container header-inner">
    <a class="logo" href="#home" id="logo">Sheep Gem</a>
    <nav class="main-nav" id="main-nav"></nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
  </div>
</header>

<section class="hero">
  <div class="container hero-inner">
    <div class="hero-copy">
      <p class="eyebrow" id="hero-eyebrow"></p>
      <h1 id="hero-headline"></h1>
      <p class="hero-sub" id="hero-subheadline"></p>
      <div class="hero-ctas">
        <a class="btn btn-primary" id="hero-cta-primary" href="#products"></a>
        <a class="btn btn-secondary" id="hero-cta-secondary" href="#intentions"></a>
      </div>
    </div>
    <div class="hero-art" aria-hidden="true">
      <div class="stone-orb orb-1"></div>
      <div class="stone-orb orb-2"></div>
      <div class="stone-orb orb-3"></div>
    </div>
  </div>
</section>

<section class="about" id="about">
  <div class="container about-inner">
    <div class="about-copy">
      <h2 id="about-heading"></h2>
      <p id="about-body"></p>
    </div>
    <div class="about-stats" id="about-stats"></div>
  </div>
</section>

<section class="intentions" id="intentions">
  <div class="container">
    <h2 class="section-title">Shop by Intention</h2>
    <p class="section-subtitle">Every stone corresponds to a bagua area and a purpose. Find yours.</p>
    <div class="intentions-grid" id="intentions-grid"></div>
  </div>
</section>

<section class="products" id="products">
  <div class="container">
    <h2 class="section-title">Featured Stones</h2>
    <p class="section-subtitle">A starting collection for every corner of your home.</p>
    <div class="products-grid" id="products-grid"></div>
  </div>
</section>

<section class="testimonials" id="testimonials">
  <div class="container">
    <h2 class="section-title">What Customers Say</h2>
    <div class="testimonials-grid" id="testimonials-grid"></div>
  </div>
</section>

<section class="newsletter">
  <div class="container newsletter-inner">
    <div>
      <h2 id="newsletter-heading"></h2>
      <p id="newsletter-body"></p>
    </div>
    <form class="newsletter-form" id="newsletter-form">
      <input type="email" placeholder="Your email address" required aria-label="Email address">
      <button type="submit" class="btn btn-primary" id="newsletter-cta"></button>
    </form>
  </div>
</section>

<section class="contact" id="contact">
  <div class="container contact-inner">
    <h2 id="contact-heading"></h2>
    <div class="contact-grid">
      <p><strong>Email:</strong> <span id="contact-email"></span></p>
      <p><strong>Phone:</strong> <span id="contact-phone"></span></p>
      <p><strong>Address:</strong> <span id="contact-address"></span></p>
    </div>
    <div class="contact-social" id="contact-social"></div>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-links" id="footer-links"></div>
    <p class="footer-copy" id="footer-copy"></p>
  </div>
</footer>

<script src="content/site-content.js"></script>
<script src="js/main.js"></script>
</body>
</html>
